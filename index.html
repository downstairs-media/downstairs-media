<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Downstairs — an archive of everything worth mentioning</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800&family=Barlow:ital,wght@0,400;1,400&family=Space+Mono@0,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --red: #C41A1A;
  --black: #111;
  --white: #FAFAF8;
  --light: #E0DDD8;
  --mid: #999;
}
body {
  background: var(--white);
  color: var(--black);
  font-family: 'Barlow', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* HEADER */
header {
  padding: 2.5rem 2rem 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--light);
}

.header-icons {
  display: flex;
  align-items: center;
  gap: 1.25rem;
}

.header-icon {
  color: var(--black);
  text-decoration: none;
  transition: color 0.15s;
  display: flex;
  align-items: center;
}

.header-icon:hover { color: var(--red); }

.header-icon svg {
  width: 20px;
  height: 20px;
  fill: currentColor;
}

.header-center {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.header-logo {
  height: 110px;
  width: auto;
  display: block;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 1.25rem;
}

.header-link {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--black);
  text-decoration: none;
  transition: color 0.15s;
}

.header-link:hover { color: var(--red); }

.header-link.substack {
  border: 1px solid var(--black);
  padding: 5px 12px;
  transition: all 0.15s;
}

.header-link.substack:hover {
  background: var(--black);
  color: var(--white);
}

/* MAIN */
main {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 4rem 2rem;
  text-align: center;
}

.tagline {
  font-family: 'Barlow', sans-serif;
  font-style: italic;
  font-size: 1.1rem;
  color: #888;
  margin-bottom: 3rem;
}

.divider {
  width: 40px;
  height: 2px;
  background: var(--red);
  margin: 0 auto 3rem;
}

/* SPOTIFY */
.spotify-wrap {
  width: 100%;
  max-width: 660px;
}

.spotify-label {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.75rem;
  margin-bottom: 1rem;
}

.spotify-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--red);
  animation: pulse 1.8s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.85); }
}

.spotify-title {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--mid);
}

.spotify-embed iframe {
  display: block;
  width: 100%;
  border: none;
  border: 1px solid var(--light);
}

/* FOOTER */
footer {
  border-top: 1px solid var(--light);
  padding: 1.25rem 2rem;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 2rem;
}

.foot-tag {
  font-family: 'Barlow', sans-serif;
  font-style: italic;
  font-size: 12px;
  color: var(--mid);
}

.foot-url {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--light);
}
</style>
</head>
<body>

<header>
  <div class="header-icons">
    <!-- Email -->
    <a href="mailto:reedaheath@gmail.com" class="header-icon" title="Email">

    <img src="Downstairs_Radio_Logo__1_.png" alt="Downstairs" class="header-logo">
  </div>

  <div class="header-right">
    <!-- UPDATE: Replace # with your Substack URL -->
    <a href="#" class="header-link substack">Substack</a>
  </div>
</header>

<main>
  <p class="tagline">an archive of everything worth mentioning</p>
  <div class="divider"></div>
  <div class="spotify-wrap">
    <div class="spotify-label">
      <div class="spotify-dot"></div>
      <span class="spotify-title">Official Downstairs Radio</span>
    </div>
    <div class="spotify-embed">
      <iframe
        src="https://open.spotify.com/embed/playlist/5khCyWMwYRvQeUKL4maLE5?utm_source=generator&theme=0"
        width="100%"
        height="352"
        frameborder="0"
        allowfullscreen=""
        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
        loading="lazy">
      </iframe>
    </div>
  </div>
</main>

<footer>
  <span class="foot-tag">an archive of everything worth mentioning</span>
  <span class="foot-url">letsgodownstairs.com</span>
</footer>

</body>
</html>

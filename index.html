<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Downstairs — An archive of what's worth paying attention to</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,700;0,800;1,400;1,700&family=Barlow:ital,wght@0,400;1,400&family=Space+Mono@0,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --red: #C41A1A;
  --black: #111;
  --white: #FFFFFF;
  --light: #E8E8E8;
  --mid: #999;
}
body {
  background: var(--white);
  color: var(--black);
  font-family: 'Barlow', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  overflow-x: hidden;
}

header {
  padding: 2rem 2.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 2px solid var(--red);
  position: relative;
  min-height: 280px;
  background: var(--white);
}
.header-icons { display: flex; align-items: center; gap: 1.5rem; z-index: 1; align-self: center; }
.header-icon { color: var(--black); text-decoration: none; transition: color 0.15s; display: flex; align-items: center; }
.header-icon:hover { color: var(--red); }
.header-icon svg { width: 24px; height: 24px; fill: currentColor; }
.header-center { position: absolute; left: 50%; transform: translateX(-50%); }
.header-logo { height: 260px; width: auto; display: block; }
.header-right { z-index: 1; align-self: center; }
.header-link.substack {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--black);
  text-decoration: none;
  border: 1px solid var(--black);
  padding: 7px 16px;
  transition: all 0.15s;
}
.header-link.substack:hover { background: var(--black); color: var(--white); }

main {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 3rem 2rem;
  text-align: center;
  background: var(--red);
  position: relative;
  overflow: hidden;
}

/* Border staircase canvas */
#stair-canvas {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 0;
}

/* Main content sits above canvas */
.main-content {
  position: relative;
  z-index: 1;
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.tagline { font-family: 'Barlow', sans-serif; font-style: italic; font-size: 1.15rem; color: rgba(255,255,255,0.8); margin-bottom: 2.5rem; }
.divider { width: 40px; height: 2px; background: rgba(255,255,255,0.5); margin: 0 auto 2.5rem; }

/* Dual widget layout */
.spotify-row {
  width: 100%;
  max-width: 1100px;
  display: flex;
  gap: 2rem;
  align-items: flex-start;
  justify-content: center;
}
.spotify-col {
  flex: 1;
  min-width: 0;
}
.spotify-label { display: flex; align-items: center; justify-content: center; gap: 0.75rem; margin-bottom: 1rem; }
.spotify-dot { width: 7px; height: 7px; border-radius: 50%; background: white; animation: pulse 1.8s ease-in-out infinite; }
.spotify-dot.delay { animation-delay: 0.9s; }
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.85); }
}
.spotify-title { font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 13px; letter-spacing: 0.08em; color: rgba(255,255,255,0.75); }
.spotify-embed iframe { display: block; width: 100%; border: none; }

footer {
  border-top: 1px solid rgba(255,255,255,0.2);
  padding: 1.25rem 2rem;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 2rem;
  flex-wrap: wrap;
  background: var(--red);
}
.foot-tag { font-family: 'Barlow', sans-serif; font-style: italic; font-size: 12px; color: rgba(255,255,255,0.6); }
.foot-url { font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.3); }

@media (max-width: 700px) {
  header {
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1.25rem;
    padding: 1.5rem 1rem;
    min-height: unset;
    position: relative;
  }
  .header-center { position: static; transform: none; order: -1; }
  .header-logo { height: 140px; }
  .header-icons { position: absolute; left: 1rem; bottom: 1.25rem; }
  .header-right { position: absolute; right: 1rem; bottom: 1.25rem; }
  .header-link.substack { font-size: 8px; padding: 5px 10px; }
  main { padding: 1.5rem 1rem 2rem; }
  .tagline { font-size: 0.95rem; margin-bottom: 1.5rem; }
  .divider { margin-bottom: 1.5rem; }
  .spotify-row { flex-direction: column; gap: 1.5rem; }
  .spotify-embed iframe { height: 352px; }
}
</style>

<main>

  <div class="main-content">

<script>
// ── Animated staircase logos along the border of <main> ──
(function() {
  const canvas = document.getElementById('stair-canvas');
  const ctx = canvas.getContext('2d');

  let stairs = [];
  let perimeter = 0;
  let W = 0, H = 0;
  let COUNT, ICON_SIZE, BORDER, SPEED;

  function setParams() {
    const mobile = window.innerWidth <= 700;
    COUNT     = mobile ? 14 : 30;
    ICON_SIZE = mobile ? 18 : 28;
    BORDER    = mobile ? 12 : 18;
    SPEED     = mobile ? 0.5 : 0.6;
  }

  function drawStair(cx, cy, angle, alpha) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(cx, cy);
    ctx.rotate(angle);
    const s = ICON_SIZE;
    const half = s / 2;
    ctx.beginPath();
    const steps = 4;
    const sw = s / steps;
    const sh = s / steps;
    ctx.moveTo(-half, -half);
    for (let i = 0; i < steps; i++) {
      ctx.lineTo(-half + i * sw, -half + i * sh);
      ctx.lineTo(-half + (i + 1) * sw, -half + i * sh);
    }
    ctx.lineTo(half, half);
    ctx.lineTo(-half, half);
    ctx.closePath();
    ctx.fillStyle = 'rgba(255,255,255,0.18)';
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.55)';
    ctx.lineWidth = 1.2;
    ctx.stroke();
    ctx.restore();
  }

  function getPerimeter() {
    return H + W + H;
  }

  function posOnPath(dist) {
    const leftLen = H;
    const topLen  = W;

    if (dist < leftLen) {
      const t = dist / leftLen;
      return { x: BORDER, y: H - t * H, angle: -Math.PI / 2 };
    } else if (dist < leftLen + topLen) {
      const t = (dist - leftLen) / topLen;
      return { x: t * W, y: BORDER, angle: 0 };
    } else {
      const t = (dist - leftLen - topLen) / H;
      return { x: W - BORDER, y: t * H, angle: Math.PI / 2 };
    }
  }

  function resize() {
    setParams();
    W = canvas.offsetWidth;
    H = canvas.offsetHeight;
    canvas.width  = W;
    canvas.height = H;
    perimeter = getPerimeter();
    // Rebuild stairs spread evenly
    stairs = [];
    for (let i = 0; i < COUNT; i++) {
      stairs.push({ dist: (i / COUNT) * perimeter });
    }
  }

  function animate() {
    ctx.clearRect(0, 0, W, H);
    for (let s of stairs) {
      s.dist = (s.dist + SPEED) % perimeter;
      const pos = posOnPath(s.dist);
      const fadeZone = 50;
      let alpha = 0.82;
      if (s.dist < fadeZone) alpha = (s.dist / fadeZone) * 0.82;
      if (s.dist > perimeter - fadeZone) alpha = ((perimeter - s.dist) / fadeZone) * 0.82;
      drawStair(pos.x, pos.y, pos.angle, alpha);
    }
    requestAnimationFrame(animate);
  }

  window.addEventListener('resize', resize);
  resize();
  animate();
})();
</script>

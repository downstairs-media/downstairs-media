<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Downstairs — an archive of everything worth mentioning</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800&family=Barlow:ital,wght@0,400;1,400&family=Space+Mono@0,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --red: #C41A1A;
  --black: #111;
  --white: #FFFFFF;
  --light: #E8E8E8;
  --mid: #999;
}
body {
  background: var(--white);
  color: var(--black);
  font-family: 'Barlow', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  overflow-x: hidden;
}

#ball {
  position: fixed;
  width: 72px;
  height: 72px;
  border-radius: 50%;
  background: var(--red);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 1000;
  box-shadow: 0 4px 16px rgba(196,26,26,0.35);
  animation: ballDrop 0.9s cubic-bezier(0.33, 0, 0.66, 1) forwards,
             ballBounce 0.5s cubic-bezier(0.33, 0, 0.66, 1) 0.9s forwards;
  top: -80px;
  left: 50%;
  transform: translateX(-50%);
}
#ball:hover { box-shadow: 0 8px 24px rgba(196,26,26,0.5); }
#ball span {
  font-family: 'Space Mono', monospace;
  font-size: 8px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: white;
  text-align: center;
  line-height: 1.3;
  padding: 4px;
  pointer-events: none;
}
@keyframes ballDrop {
  0% { top: -80px; }
  100% { top: 100px; }
}
@keyframes ballBounce {
  0% { top: 100px; transform: translateX(-50%) scaleY(1); }
  30% { top: 80px; transform: translateX(-50%) scaleY(0.85); }
  60% { top: 50px; transform: translateX(-50%) scaleY(1.05); }
  100% { top: 70px; transform: translateX(-50%) scaleY(1); }
}
#ball.settled {
  top: 70px;
  animation: gentleBob 3s ease-in-out infinite;
}
@keyframes gentleBob {
  0%, 100% { top: 70px; }
  50% { top: 60px; }
}

header {
  padding: 3rem 2.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--light);
  position: relative;
  min-height: 220px;
}
.header-icons { display: flex; align-items: center; gap: 1.5rem; z-index: 1; }
.header-icon { color: var(--black); text-decoration: none; transition: color 0.15s; display: flex; align-items: center; }
.header-icon:hover { color: var(--red); }
.header-icon svg { width: 24px; height: 24px; fill: currentColor; }
.header-center { position: absolute; left: 50%; transform: translateX(-50%); }
.header-logo { height: 200px; width: auto; display: block; }
.header-right { z-index: 1; }
.header-link.substack {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--black);
  text-decoration: none;
  border: 1px solid var(--black);
  padding: 7px 16px;
  transition: all 0.15s;
}
.header-link.substack:hover { background: var(--black); color: var(--white); }

main {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 3rem 2rem;
  text-align: center;
}
.tagline {
  font-family: 'Barlow', sans-serif;
  font-style: italic;
  font-size: 1.15rem;
  color: #888;
  margin-bottom: 2.5rem;
}
.divider { width: 40px; height: 2px; background: var(--red); margin: 0 auto 2.5rem; }
.spotify-wrap { width: 100%; max-width: 900px; }
.spotify-label {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.75rem;
  margin-bottom: 1rem;
}
.spotify-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--red);
  animation: pulse 1.8s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.85); }
}
.spotify-title {
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 0.08em;
  color: var(--mid);
}
.spotify-embed iframe { display: block; width: 100%; border: 1px solid var(--light); }

footer {
  border-top: 1px solid var(--light);
  padding: 1.25rem 2rem;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 2rem;
}
.foot-tag { font-family: 'Barlow', sans-serif; font-style: italic; font-size: 12px; color: var(--mid); }
.foot-url { font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--light); }
</style>
</head>
<body>

<div id="ball" onclick="window.open('https://youtu.be/dQw4w9WgXcQ?si=BJc-kNfNVVALK2wH', '_blank')">
  <span>Click<br>me</span>
</div>

<header>
  <div class="header-icons">
    <a href="mailto:reedaheath@gmail.com" class="header-icon" title="Email">
      <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
    </a>
    <a href="https://instagram.com/downstairsradio" target="_blank" class="header-icon" title="Instagram">
      <svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
    </a>
  </div>
  <div class="header-center">
    <img src="Downstairs_Radio_Logo__1_.png" alt="Downstairs" class="header-logo">
  </div>
  <div class="header-right">
    <a href="https://substack.com/@downstairsmedia" target="_blank" class="header-link substack">Substack</a>
  </div>
</header>

<main>
  <p class="tagline">an archive of everything worth mentioning</p>
  <div class="divider"></div>
  <div class="spotify-wrap">
    <div class="spotify-label">
      <div class="spotify-dot"></div>
      <span class="spotify-title">Official Downstairs Radio</span>
    </div>
    <div class="spotify-embed">
      <iframe
        src="https://open.spotify.com/embed/playlist/5khCyWMwYRvQeUKL4maLE5?utm_source=generator&theme=0"
        width="100%"
        height="500"
        frameborder="0"
        allowfullscreen=""
        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
        loading="lazy">
      </iframe>
    </div>
  </div>
</main>

<footer>
  <span class="foot-tag">an archive of everything worth mentioning</span>
  <span class="foot-url">letsgodownstairs.com</span>
</footer>

<script>
  const ball = document.getElementById('ball');
  setTimeout(() => ball.classList.add('settled'), 1400);
</script>

</body>
</html>

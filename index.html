<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Downstairs — an archive of everything worth mentioning</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800&family=Barlow:ital,wght@0,400;1,400&family=Space+Mono@0,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --red: #C41A1A;
  --black: #111;
  --white: #FAFAF8;
  --off: #F0EDE8;
  --light: #E0DDD8;
  --mid: #999;
}
body {
  background: var(--white);
  color: var(--black);
  font-family: 'Barlow', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

nav {
  display: flex;
  align-items: stretch;
  height: 50px;
  border-bottom: 2px solid var(--black);
}
.nav-logo-wrap {
  padding: 0 1.5rem;
  display: flex;
  align-items: center;
  border-right: 2px solid var(--black);
  background: var(--red);
}
.nav-logo {
  font-family: 'Nunito', sans-serif;
  font-weight: 800;
  font-size: 1.4rem;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--white);
}
.nav-right {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding: 0 1.5rem;
}
.nav-sub {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--black);
  text-decoration: none;
}
.nav-sub:hover { color: var(--red); }

main {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 4rem 2rem;
  max-width: 680px;
}

.main-title {
  font-family: 'Nunito', sans-serif;
  font-weight: 800;
  font-size: clamp(3.8rem, 10vw, 6.5rem);
  letter-spacing: 0.01em;
  line-height: 0.97;
  margin-bottom: 2rem;
}
.main-title .solid { display: block; color: var(--black); }
.main-title .outline {
  display: block;
  -webkit-text-stroke: 2px var(--black);
  color: transparent;
}

.divider {
  width: 40px;
  height: 2px;
  background: var(--red);
  margin-bottom: 1.75rem;
}

.descriptor {
  font-family: 'Barlow', sans-serif;
  font-style: italic;
  font-size: 1.1rem;
  line-height: 1.65;
  color: #666;
  margin-bottom: 2.5rem;
}

.cta-row {
  display: flex;
  align-items: center;
  gap: 1.5rem;
}
.cta-main {
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  background: var(--red);
  color: var(--white);
  text-decoration: none;
  padding: 10px 22px;
  transition: background 0.15s;
}
.cta-main:hover { background: var(--black); }
.cta-sub {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--mid);
  text-decoration: none;
  border-bottom: 1px solid var(--light);
  padding-bottom: 2px;
}
.cta-sub:hover { color: var(--black); border-color: var(--black); }

/* RADIO SECTION */
.radio-section {
  border-top: 2px solid var(--black);
  background: var(--off);
  padding: 2rem;
}
.radio-header {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin-bottom: 1.25rem;
}
.radio-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--red);
  animation: pulse 1.8s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.85); }
}
.radio-label {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--mid);
}
.radio-title {
  font-family: 'Nunito', sans-serif;
  font-weight: 800;
  font-size: 1.1rem;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--black);
}
.spotify-embed {
  overflow: hidden;
  border: 1px solid var(--light);
}
.spotify-embed iframe {
  display: block;
  width: 100%;
  border: none;
}

/* FOOTER */
footer {
  border-top: 1px solid var(--light);
  padding: 1rem 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.foot-cats {
  display: flex;
  gap: 1.5rem;
}
.foot-cats span {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--mid);
}
.foot-tag {
  font-family: 'Barlow', sans-serif;
  font-style: italic;
  font-size: 11px;
  color: var(--light);
}
</style>
</head>
<body>

<nav>
  <div class="nav-logo-wrap">
    <div class="nav-logo">Downstairs</div>
  </div>
  <div class="nav-right">
    <!-- UPDATE: Replace # with your Substack URL -->
    <a href="#" class="nav-sub">Read on Substack ↗</a>
  </div>
</nav>

<main>
  <div class="main-title">
    <span class="solid">Down</span>
    <span class="outline">Stairs</span>
  </div>
  <div class="divider"></div>
  <p class="descriptor">an archive of everything worth mentioning</p>
  <div class="cta-row">
    <!-- UPDATE: Replace # with your Substack URL -->
    <a href="#" class="cta-main">Read on Substack</a>
    <!-- UPDATE: Replace # with your archive URL -->
    <a href="#" class="cta-sub">Browse the archive</a>
  </div>
</main>

<div class="radio-section">
  <div class="radio-header">
    <div class="radio-dot"></div>
    <span class="radio-label">Now Playing</span>
    <span class="radio-title">Official Downstairs Radio</span>
  </div>
  <div class="spotify-embed">
    <!-- UPDATE: Replace the src URL with your Spotify playlist embed link -->
    <!-- How to get it: open your playlist in Spotify → click ··· → Share → Embed playlist → copy the src URL from the iframe code -->
    <iframe
      src="https://open.spotify.com/embed/playlist/https://open.spotify.com/playlist/5khCyWMwYRvQeUKL4maLE5?si=d06f07f4aa2a4caf?utm_source=generator&theme=0"
      width="100%"
      height="352"
      frameborder="0"
      allowfullscreen=""
      allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
      loading="lazy">
    </iframe>
  </div>
</div>

<footer>
  <div class="foot-cats">
    <span>Music</span>
    <span>Culture</span>
    <span>Essays</span>
    <span>Playlists</span>
  </div>
  <span class="foot-tag">letsgodownstairs.com</span>
</footer>

</body>
</html>
